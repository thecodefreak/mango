name: Mango Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: mango-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-24.04
    outputs:
      version_tag: ${{ steps.meta.outputs.version_tag }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - name: Derive version from tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          version_tag="${GITHUB_REF_NAME}"
          version="${version_tag#v}"
          is_prerelease="false"

          if [[ "${version}" == *-* ]]; then
            is_prerelease="true"
          fi

          echo "version_tag=${version_tag}" >> "${GITHUB_OUTPUT}"
          echo "is_prerelease=${is_prerelease}" >> "${GITHUB_OUTPUT}"

  build-artifacts:
    name: Build binaries (${{ matrix.platform_id }})
    runs-on: ubuntu-24.04
    needs: prepare

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            goarm: ""
            ext: ""
            archive: tar.gz
            platform_id: linux_amd64

          - goos: linux
            goarch: arm64
            goarm: ""
            ext: ""
            archive: tar.gz
            platform_id: linux_arm64

          - goos: linux
            goarch: arm
            goarm: "7"
            ext: ""
            archive: tar.gz
            platform_id: linux_armv7

          - goos: windows
            goarch: amd64
            goarm: ""
            ext: .exe
            archive: zip
            platform_id: windows_amd64

          - goos: darwin
            goarch: amd64
            goarm: ""
            ext: ""
            archive: tar.gz
            platform_id: darwin_amd64

          - goos: darwin
            goarch: arm64
            goarm: ""
            ext: ""
            archive: tar.gz
            platform_id: darwin_arm64

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build and package binaries
        env:
          VERSION_TAG: ${{ needs.prepare.outputs.version_tag }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          EXT: ${{ matrix.ext }}
          ARCHIVE: ${{ matrix.archive }}
          PLATFORM_ID: ${{ matrix.platform_id }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          mkdir -p build

          export CGO_ENABLED=0

          if [[ -n "${GOARM}" ]]; then
            export GOARM
          fi

          go build -trimpath -ldflags="-s -w" -o "build/mango${EXT}" ./cmd/mango
          go build -trimpath -ldflags="-s -w" -o "build/mango-server${EXT}" ./cmd/mango-server

          if [[ "${ARCHIVE}" == "tar.gz" ]]; then
            tar -C build -czf "dist/mango_${VERSION_TAG}_${PLATFORM_ID}.tar.gz" "mango${EXT}"
            tar -C build -czf "dist/mango-server_${VERSION_TAG}_${PLATFORM_ID}.tar.gz" "mango-server${EXT}"
          else
            (
              cd build
              zip -q "../dist/mango_${VERSION_TAG}_${PLATFORM_ID}.zip" "mango${EXT}"
              zip -q "../dist/mango-server_${VERSION_TAG}_${PLATFORM_ID}.zip" "mango-server${EXT}"
            )
          fi

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.platform_id }}
          path: dist/*
          if-no-files-found: error
          compression-level: 0

  release:
    name: Create GitHub release
    runs-on: ubuntu-24.04
    needs: [prepare, build-artifacts]

    permissions:
      contents: write

    steps:
      - name: Download platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          path: downloaded-artifacts
          merge-multiple: false

      - name: Consolidate artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          shopt -s nullglob

          found=0

          for artifact_dir in downloaded-artifacts/artifacts-*; do
            for file in "$artifact_dir"/*; do
              cp "$file" dist/
              found=1
            done
          done

          if [[ "$found" -ne 1 ]]; then
            echo "No release artifacts were downloaded"
            exit 1
          fi

      - name: Generate checksums
        env:
          VERSION_TAG: ${{ needs.prepare.outputs.version_tag }}
        shell: bash
        run: |
          (
            cd dist
            sha256sum * > "sha256sums_${VERSION_TAG}.txt"
          )

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.prepare.outputs.version_tag }}
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          files: |
            dist/*

  docker:
    name: Mango Docker image
    runs-on: ubuntu-24.04
    needs: prepare

    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Compute Docker tags
        id: docker_tags
        env:
          VERSION_TAG: ${{ needs.prepare.outputs.version_tag }}
          IS_PRERELEASE: ${{ needs.prepare.outputs.is_prerelease }}
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "tags<<EOF"
            echo "ghcr.io/thecodefreak/mango-server:${VERSION_TAG}"

            if [[ "${IS_PRERELEASE}" != "true" ]]; then
              echo "ghcr.io/thecodefreak/mango-server:latest"
            fi

            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build image
        shell: bash
        run: |
          set -euo pipefail

          docker_build_tags=""

          while IFS= read -r tag; do
            docker_build_tags="${docker_build_tags} -t ${tag}"
          done <<< "${{ steps.docker_tags.outputs.tags }}"

          docker build \
            -f Dockerfile.server \
            ${docker_build_tags} \
            .

      - name: Push image
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r tag; do
            docker push "${tag}"
          done <<< "${{ steps.docker_tags.outputs.tags }}"